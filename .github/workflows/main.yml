name: Build Windows Executable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) {
          # This line filters out the "Python 3.10 or newer" text to prevent the pip crash
          Get-Content requirements.txt | Where-Object { $_ -notmatch 'Python' } | Set-Content clean_requirements.txt
          pip install -r clean_requirements.txt
        }

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile miditochart.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: midi-to-chart-executable
        path: dist/miditochart.exe
